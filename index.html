<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
 <h1>Hello World !</h1>
 </header>
 <main>

    <img src="images/placeholder.jpg" alt="This is a placeholder image" width="300" height="200"/>
    <section>
        <h2>
            Contact me
        </h2>
        <form method="post">
            <div>
                <label for="name">Name : </label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>
<br>
             <div>
                <label for="name">Email : </label>
                <input type="text" id="email" name="email" placeholder="Enter you email..." required>
            </div>
             <br>
             <div>
                <label for="name">Message : </label>
                <textarea  id="message" name="message" rows="5" 
                minlength="5"
                placeholder="Please type your message here...." required></textarea>
            </div>
             <br>
<button style="background-color:#fff; color: #000; width: fit-content; padding: 5px; cursor: pointer; "  type="submit" >submit</button>
        </form>
    </section>

 </main>
</body>
</html>
